name: newu_task
description: "A Breathing exercise app"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  audioplayers: ^6.5.1
  equatable: ^2.0.8
  lottie: ^3.3.2
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.3
  collection: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/audios/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-VariableFont_wght.ttf
          weight: 300
        - asset: assets/fonts/Quicksand-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/Quicksand-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/Quicksand-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/Quicksand-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/Quicksand-VariableFont_wght.ttf
          weight: 800
        - asset: assets/fonts/Quicksand-VariableFont_wght.ttf
          weight: 900
